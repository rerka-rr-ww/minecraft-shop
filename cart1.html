<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAL HUB — Корзина покупок</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2c2c2c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .main-logo { width: 140px; height: auto; image-rendering: pixelated; object-fit: contain; }
        h1 { color: #55ffff; text-shadow: 2px 2px #005555; text-align: center; margin: 0; }
        .cart-panel {
            background: #4a4a4a;
            border: 4px solid #1a1a1a;
            border-radius: 4px;
            padding: 30px;
            min-width: 450px;
            max-width: 600px;
            box-shadow: inset 3px 3px 0 #8b8b8b;
            margin-bottom: 30px;
        }
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #333333;
            border: 2px solid #1a1a1a;
            padding: 10px 15px;
            margin-bottom: 12px;
            border-radius: 4px;
        }
        .item-info { display: flex; align-items: center; gap: 15px; font-size: 18px; }
        .item-info img { width: 32px; height: 32px; image-rendering: pixelated; }
        .item-price { font-weight: bold; color: #55ff55; text-shadow: 1px 1px #005500; font-size: 18px; }
        .total-box {
            border-top: 4px dashed #373737;
            margin-top: 20px;
            padding-top: 15px;
            text-align: right;
            font-size: 22px;
            font-weight: bold;
        }
        #total-sum { color: #ffff55; text-shadow: 1px 1px #555500; }
        .action-buttons { display: flex; gap: 20px; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            border: 4px solid #000000;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            box-shadow: 0 4px 0 #1a1a1a;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-clear { background: #ff5555; color: #ffffff; border-top-color: #ffaaaa; border-left-color: #ffaaaa; }
        .btn-clear:hover { background: #ff7777; }
        .btn-buy { background: #55ff55; color: #000000; min-width: 200px; }
        .btn-buy:hover { background: #aaffaa; }
        .btn-back { background: #a8a8a8; color: #ffffff; }
        .btn-back:hover { background: #c0c0c0; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="MetalHub.png" alt="METAL HUB" class="main-logo">
        <h1>Ваша корзина</h1>
    </div>

    <div class="cart-panel">
        <div id="cart-list">
            <!-- Сюда JS выведет список купленного -->
        </div>
        <div class="total-box">
            Итого: <span id="total-sum">0 ар</span>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-clear" onclick="clearCart()">ОЧИСТИТЬ</button>
        <button class="btn btn-buy" id="checkout-btn" onclick="checkout()">ОФОРМИТЬ (НА СКЛАД)</button>
    </div>
    
    <a href="index1.html" class="btn btn-back">НАЗАД В МАГАЗИН</a>

    <script>
        renderCart();

        // Проверяем, закрыты ли теги в инфо на этой странице
        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('metal_hub_cart')) || [];
            let listContainer = document.getElementById('cart-list');
            let checkoutBtn = document.getElementById('checkout-btn');
            
            if (cart.length === 0) {
                listContainer.innerHTML = `<div style="text-align:center; color:#aaa; padding:20px;">Ваша корзина пуста...</div>`;
                document.getElementById('total-sum').innerText = "0 ар";
                checkoutBtn.style.opacity = "0.5";
                checkoutBtn.style.cursor = "not-allowed";
                checkoutBtn.disabled = true;
                return;
            }

            checkoutBtn.style.opacity = "1";
            checkoutBtn.style.cursor = "pointer";
            checkoutBtn.disabled = false;

            let html = "";
            let total = 0;

            cart.forEach(item => {
                total += item.price;
                html += `
                    <div class="cart-item">
                        <div class="item-info">
                            ${item.icon}
                            <span>${item.name}</span>
                        </div>
                        <div class="item-price">${item.price} ар</div>
                    </div>
                `;
            });

            listContainer.innerHTML = html;
            document.getElementById('total-sum').innerText = total + " ар";
        }

        function clearCart() {
            localStorage.removeItem('metal_hub_cart');
            renderCart();
        }

        // Обновленная функция сборки всех предметов
        function checkout() {
            let cart = JSON.parse(localStorage.getItem('metal_hub_cart')) || [];
            if (cart.length === 0) return;
            
            // Собираем все ID предметов через запятую (например: "sword,helmet,steak")
            let allItemIds = cart.map(item => item.id).join(',');
            
            // Передаем весь список на склад
            window.location.href = "decor1.html?items=" + allItemIds;
        }
    </script>
</body>
</html>
