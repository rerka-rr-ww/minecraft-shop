<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAL HUB — Магазин снаряжения</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2c2c2c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .main-logo {
            width: 140px;
            height: auto;
            image-rendering: pixelated;
            object-fit: contain;
        }
        h1 {
            color: #55ffff;
            text-shadow: 2px 2px #005555;
            text-align: center;
            margin: 0;
        }
        .shop-container {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
            align-items: flex-start;
        }
        .section-title {
            font-size: 14px;
            color: #aaaaaa;
            text-align: center;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .armor-column, .tools-column, .food-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        @media (max-width: 768px) {
            .shop-container {
                flex-direction: column;
                align-items: center;
                gap: 30px;
            }
            .armor-column, .tools-column, .food-column {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
        .icon-card {
            background: #8b8b8b;
            border: 4px solid #373737;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-radius: 4px;
            width: 92px;
            height: 92px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.1s;
            user-select: none;
        }
        .icon-card img {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
        }
        .icon-card:hover {
            background: #a8a8a8;
            border-color: #55ffff;
        }
        .icon-card:active {
            border-top-color: #373737;
            border-left-color: #373737;
            border-bottom-color: #ffffff;
            border-right-color: #ffffff;
        }
        .display-panel {
            padding: 25px;
            background: #4a4a4a;
            border: 4px solid #1a1a1a;
            border-radius: 4px;
            min-width: 300px;
            text-align: center;
            box-shadow: inset 3px 3px 0 #8b8b8b;
            margin-bottom: 20px;
        }
        #item-name {
            margin: 0 0 15px 0;
            color: #ffff55;
            text-shadow: 1px 1px #555500;
        }
        #item-name img {
            width: 30px;
            height: 30px;
            vertical-align: middle;
            image-rendering: pixelated;
        }
        #price-text {
            font-size: 28px;
            font-weight: bold;
            color: #55ff55;
            text-shadow: 1px 1px #005500;
        }
        .btn-buy {
            display: inline-block;
            min-width: 350px;
            padding: 15px;
            background: #a8a8a8;
            border: 4px solid #000000;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            cursor: not-allowed;
            user-select: none;
            box-shadow: 0 4px 0 #1a1a1a;
            opacity: 0.5;
            transition: all 0.1s;
        }
        .btn-buy.active {
            background: #4a4a4a;
            color: #ffffff;
            cursor: pointer;
            opacity: 1;
        }
        .btn-buy.active:hover {
            background: #55ffff;
            color: #000000;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
        }
        .btn-buy.active:active {
            border-top-color: #000000;
            border-left-color: #000000;
            border-bottom-color: #ffffff;
            border-right-color: #ffffff;
            box-shadow: none;
            transform: translateY(4px);
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="MetalHub.png" alt="METAL HUB" class="main-logo">
        <h1>Магазин снаряжения</h1>
    </div>

    <div class="shop-container">
        <div>
            <div class="section-title">Броня</div>
            <div class="armor-column">
                <div class="icon-card" onclick="showPrice('<img src=\'helmet.png.png\'>', 'Алмазный шлем', '16 ар', 'helmet')">
                    <img src="helmet.png.png" alt="Шлем">
                </div>
                <div class="icon-card" onclick="showPrice('<img src=\'chestplate.png.png\'>', 'Алмазный нагрудник', '20 ар', 'chestplate')">
                    <img src="chestplate.png.png" alt="Нагрудник">
                </div>
                <div class="icon-card" onclick="showPrice('<img src=\'leggings.png.png\'>', 'Алмазные штаны', '18 ар', 'leggings')">
                    <img src="leggings.png.png" alt="Штаны">
                </div>
                <div class="icon-card" onclick="showPrice('<img src=\'boots.png.png\'>', 'Алмазные ботинки', '17 ар', 'boots')">
                    <img src="boots.png.png" alt="Ботинки">
                </div>
            </div>
        </div>

        <div>
            <div class="section-title">Оружие / Инструменты</div>
            <div class="tools-column">
                <div class="icon-card" onclick="showPrice('<img src=\'sword.png.png\'>', 'Алмазный меч', '20 ар', 'sword')">
                    <img src="sword.png.png" alt="Меч">
                </div>
                <div class="icon-card" onclick="showPrice('<img src=\'pickaxe.png.png\'>', 'Алматная кирка', '15 ар', 'pickaxe')">
                    <img src="pickaxe.png.png" alt="Кирка">
                </div>
                <div class="icon-card" onclick="showPrice('<img src=\'axe.png.png\'>', 'Алмазный топор', '13 ар', 'axe')">
                    <img src="axe.png.png" alt="Топор">
                </div>
            </div>
        </div>

        <div>
            <div class="section-title">Еда</div>
            <div class="food-column">
                <div class="icon-card" onclick="showPrice('<img src=\'Golden_Apple_JE2_BE2.png\'>', 'Золотое яблоко', '64 ар', 'gapple')">
                    <img src="Golden_Apple_JE2_BE2.png" alt="Золотое яблоко">
                </div>
                <div class="icon-card" onclick="showPrice('<img src=\'Golden_Carrot_JE4_BE2.png\'>', 'Золотая морковь', '18 ар', 'carrot')">
                    <img src="Golden_Carrot_JE4_BE2.png" alt="Золотая морковь">
                </div>
                <div class="icon-card" onclick="showPrice('<img src=\'Steak_JE4_BE3.png\'>', 'Стейк', '5 ар', 'steak')">
                    <img src="Steak_JE4_BE3.png" alt="Стейк">
                </div>
                <div class="icon-card" onclick="showPrice('<img src=\'Bread_JE3_BE3.png\'>', 'Хлеб', '3 ар', 'bread')">
                    <img src="Bread_JE3_BE3.png" alt="Хлеб">
                </div>
            </div>
        </div>
    </div>

    <div class="display-panel">
        <h2 id="item-name">Нажмите на предмет из списка</h2>
        <div id="price-text">—</div>
    </div>

    <a href="#" id="buy-button" class="btn-buy" onclick="checkSelection(event)">КУПИТЬ</a>

    <script>
        let isItemSelected = false;

        function showPrice(iconHtml, name, price, itemId) {
            document.getElementById('item-name').innerHTML = iconHtml + " " + name;
            document.getElementById('price-text').innerText = price;
            
            isItemSelected = true;
            const buyBtn = document.getElementById('buy-button');
            buyBtn.classList.add('active');
            buyBtn.href = "decor1.html?item=" + itemId; 
        }

        function checkSelection(event) {
            if (!isItemSelected) {
                event.preventDefault();
            }
        }
    </script>
</body>
</html>
