<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAL HUB — Информация о товаре</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2c2c2c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .main-logo { width: 140px; height: auto; image-rendering: pixelated; object-fit: contain; }
        h1 { color: #55ffff; text-shadow: 2px 2px #005555; text-align: center; margin: 0; }
        .info-panel {
            background: #4a4a4a;
            border: 4px solid #1a1a1a;
            border-radius: 4px;
            padding: 30px;
            min-width: 400px;
            max-width: 500px;
            box-shadow: inset 3px 3px 0 #8b8b8b;
            margin-bottom: 40px;
        }
        .header-panel { text-align: center; margin-bottom: 25px; border-bottom: 4px dashed #373737; padding-bottom: 15px; }
        .large-icon img { width: 80px; height: 80px; image-rendering: pixelated; }
        .info-title { color: #ffff55; font-size: 26px; margin: 0; text-shadow: 1px 1px #555500; }
        .point-card { background: #333333; border: 3px solid #1a1a1a; border-radius: 4px; padding: 15px; margin-bottom: 15px; box-shadow: inset 2px 2px 0 #555555; }
        .point-name { font-size: 18px; font-weight: bold; color: #ffff55; margin-bottom: 8px; text-transform: uppercase; }
        .point-data { font-size: 16px; margin: 5px 0; color: #e0e0e0; }
        .data-value { font-weight: bold; color: #55ff55; text-shadow: 1px 1px #005500; }
        .data-value.low-stock { color: #ff5555; text-shadow: 1px 1px #550000; }
        .btn-back {
            display: inline-block;
            min-width: 250px;
            padding: 12px 25px;
            background: #a8a8a8;
            border: 4px solid #000000;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            color: #ffffff;
            text-shadow: 1px 1px #000000;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 0 #1a1a1a;
            transition: all 0.1s;
        }
        .btn-back:hover { background: #ffff55; color: #000000; text-shadow: none; }
        .btn-back:active { border-top-color: #000000; border-left-color: #000000; border-bottom-color: #ffffff; border-right-color: #ffffff; box-shadow: none; transform: translateY(4px); }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="MetalHub.png" alt="METAL HUB" class="main-logo">
        <h1>Учёт запасов</h1>
    </div>

    <div class="info-panel">
        <div class="header-panel">
            <div class="large-icon" id="item-icon">❓</div>
            <h2 class="info-title" id="item-title">Загрузка...</h2>
        </div>
        <div id="points-container"></div>
    </div>

    <a href="decor1.html" class="btn-back">НАЗАД К БОЧКАМ</a>

    <script>
        const itemsDatabase = {
            helmet: {
                name: "Алмазный шлем", icon: "<img src='helmet.png.png'>",
                points: [
                    { name: "Спавн", count: 4, coords: "X: 100, Y: 64, Z: -200" },
                    { name: "Город уродов", count: 1, coords: "X: 1450, Y: 72, Z: 890" },
                    { name: "cst_", count: 12, coords: "X: -510, Y: 11, Z: 340" }
                ]
            },
            chestplate: {
                name: "Алмазный нагрудник", icon: "<img src='chestplate.png.png'>",
                points: [
                    { name: "Спавн", count: 2, coords: "X: 100, Y: 64, Z: -198" },
                    { name: "Город уродов", count: 0, coords: "X: 1450, Y: 72, Z: 892" },
                    { name: "cst_", count: 7, coords: "X: -510, Y: 11, Z: 342" }
                ]
            },
            leggings: {
                name: "Алманые штаны", icon: "<img src='leggings.png.png'>",
                points: [
                    { name: "Спавн", count: 5, coords: "X: 100, Y: 64, Z: -196" },
                    { name: "Город уродов", count: 3, coords: "X: 1450, Y: 72, Z: 894" },
                    { name: "cst_", count: 9, coords: "X: -510, Y: 11, Z: 344" }
                ]
            },
            boots: {
                name: "Алмазные ботинки", icon: "<img src='boots.png.png'>",
                points: [
                    { name: "Спавн", count: 8, coords: "X: 100, Y: 64, Z: -194" },
                    { name: "Город уродов", count: 2, coords: "X: 1450, Y: 72, Z: 896" },
                    { name: "cst_", count: 15, coords: "X: -510, Y: 11, Z: 346" }
                ]
            },
            sword: {
                name: "Алмазный меч", icon: "<img src='sword.png.png'>",
                points: [
                    { name: "Спавн", count: 10, coords: "X: 120, Y: 65, Z: -150" },
                    { name: "Город уродов", count: 5, coords: "X: 1480, Y: 63, Z: 800" },
                    { name: "cst_", count: 20, coords: "X: -490, Y: 40, Z: 310" }
                ]
            },
            pickaxe: {
                name: "Алманая кирка", icon: "<img src='pickaxe.png.png'>",
                points: [
                    { name: "Спавн", count: 1, coords: "X: 120, Y: 65, Z: -148" },
                    { name: "Город уродов", count: 4, coords: "X: 1480, Y: 63, Z: 802" },
                    { name: "cst_", count: 8, coords: "X: -490, Y: 40, Z: 312" }
                ]
            },
            axe: {
                name: "Алмазный топор", icon: "<img src='axe.png.png'>",
                points: [
                    { name: "Спавн", count: 3, coords: "X: 120, Y: 65, Z: -146" },
                    { name: "Город уродов", count: 2, coords: "X: 1480, Y: 63, Z: 804" },
                    { name: "cst_", count: 6, coords: "X: -490, Y: 40, Z: 314" }
                ]
            },
            gapple: {
                name: "Золотое яблоко", icon: "<img src='Golden_Apple_JE2_BE2.png'>",
                points: [
                    { name: "Спавн", count: 64, coords: "X: 90, Y: 70, Z: -300" },
                    { name: "Город уродов", count: 32, coords: "X: 1500, Y: 80, Z: 950" },
                    { name: "cst_", count: 128, coords: "X: -550, Y: 20, Z: 400" }
                ]
            },
            carrot: {
                name: "Золотая морковь", icon: "<img src='Golden_Carrot_JE4_BE2.png'>",
                points: [
                    { name: "Спавн", count: 150, coords: "X: 95, Y: 68, Z: -280" },
                    { name: "Город уродов", count: 40, coords: "X: 1510, Y: 75, Z: 930" },
                    { name: "cst_", count: 300, coords: "X: -530, Y: 18, Z: 410" }
                ]
            },
            steak: {
                name: "Стейк", icon: "<img src='Steak_JE4_BE3.png'>",
                points: [
                    { name: "Спавн", count: 256, coords: "X: 90, Y: 70, Z: -298" },
                    { name: "Город уродов", count: 64, coords: "X: 1500, Y: 80, Z: 952" },
                    { name: "cst_", count: 512, coords: "X: -550, Y: 20, Z: 402" }
                ]
            },
            bread: {
                name: "Хлеб", icon: "<img src='Bread_JE3_BE3.png'>",
                points: [
                    { name: "Спавн", count: 128, coords: "X: 90, Y: 70, Z: -296" },
                    { name: "Город уродов", count: 128, coords: "X: 1500, Y: 80, Z: 954" },
                    { name: "cst_", count: 256, coords: "X: -550, Y: 20, Z: 404" }
                ]
            }
        };

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const currentItemKey = getQueryParam('item');
        const container = document.getElementById('points-container');

        if (currentItemKey && itemsDatabase[currentItemKey]) {
            const product = itemsDatabase[currentItemKey];
            
            document.getElementById('item-icon').innerHTML = product.icon;
            document.getElementById('item-title').innerText = product.name;

            product.points.forEach(point => {
                const lowStockClass = point.count <= 1 ? 'low-stock' : '';
                const pointHTML = `
                    <div class="point-card">
                        <div class="point-name">${point.name}</div>
                        <div class="point-data">В наличии: <span class="data-value ${lowStockClass}">${point.count} шт.</span></div>
                        <div class="point-data">Координаты: <span class="data-value">${point.coords}</span></div>
                    </div>
                `;
                container.innerHTML += pointHTML;
            });
        } else {
            document.getElementById('item-title').innerText = "Товар отсутствует";
            container.innerHTML = `<div style="text-align:center; color:#ff5555;">Пожалуйста, перейдите на эту страницу со склада.</div>`;
        }
    </script>
</body>
</html>
